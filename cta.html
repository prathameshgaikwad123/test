<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料相談 | ミライ建設ナビ</title>
  <link rel="stylesheet" href="cta.css">
</head>
<body>

  <div class="cta-page">
    <!-- ====== Pink Header ====== -->
    <div class="cta-header">
      <svg class="cta-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p class="cta-header-text">無料相談はこちらから</p>
    </div>

    <!-- ====== Step Navigation ====== -->
    <div class="step-nav">
      <div class="step-item active" data-step="1">
        <span class="step-label">STEP1</span>
      </div>
      <svg class="step-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <div class="step-item" data-step="2">
        <span class="step-label">STEP2</span>
      </div>
      <svg class="step-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <div class="step-item" data-step="3">
        <span class="step-label">STEP3</span>
      </div>
      <svg class="step-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <div class="step-item" data-step="4">
        <span class="step-label">STEP4</span>
      </div>
    </div>

    <!-- ====== Step 1: 転職時期 & 勤務地 ====== -->
    <div class="step-content active" id="step1">
      <div class="step-form-container">

        <div class="form-group">
          <label class="form-label">ご希望の転職時期</label>
          <div class="form-select-wrapper">
            <select class="form-select" id="timing">
              <option value="" disabled selected>選択してください</option>
              <option value="asap">なるべく早く</option>
              <option value="3months">三か月以内</option>
              <option value="6months">半年以内</option>
              <option value="1year">一年以内</option>
              <option value="unsure">分からない</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">ご希望の勤務地</label>
          <div class="form-select-wrapper">
            <select class="form-select" id="location">
              <option value="" disabled selected>選択してください</option>
              <option value="osaka">大阪府</option>
              <option value="kyoto">京都府</option>
              <option value="hyogo">兵庫県</option>
              <option value="nara">奈良県</option>
              <option value="shiga">滋賀県</option>
              <option value="wakayama">和歌山県</option>
              <option value="any">関西エリア全域</option>
              <option value="unsure">分からない</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

      </div>

      <!-- Buttons -->
      <div class="step-buttons">
        <button class="btn-next" onclick="goToStep(2)">
          次へ進む
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <button class="btn-back" onclick="goBack()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          前の画面に戻る
        </button>
      </div>
    </div>

    <!-- ====== Step 2: 職種 ====== -->
    <div class="step-content" id="step2">
      <div class="step-form-container">

        <div class="form-group">
          <label class="form-label">ご希望の職種</label>
          <div class="form-select-wrapper">
            <select class="form-select" id="jobtype">
              <option value="" disabled selected>選択してください</option>
              <option value="sekou-kanri">施工管理（現場監督）</option>
              <option value="sekou-eng">施工管理エンジニア</option>
              <option value="kouji-kanri">工事監理</option>
              <option value="setsubi">設備管理</option>
              <option value="sekkei">設計・企画</option>
              <option value="other">その他</option>
              <option value="unsure">分からない</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">現在の雇用形態</label>
          <div class="form-select-wrapper">
            <select class="form-select" id="employment">
              <option value="" disabled selected>選択してください</option>
              <option value="seishain">正社員</option>
              <option value="keiyaku">契約社員</option>
              <option value="haken">派遣社員</option>
              <option value="other">その他</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

      </div>

      <!-- Buttons -->
      <div class="step-buttons">
        <button class="btn-next" onclick="goToStep(3)">
          次へ進む
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <button class="btn-back" onclick="goToStep(1)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          前の画面に戻る
        </button>
      </div>
    </div>

    <!-- ====== Step 3: お名前 ====== -->
    <div class="step-content" id="step3">
      <div class="step-form-container">

        <div class="form-group">
          <label class="form-label">お名前</label>
          <input type="text" class="form-input" id="name" placeholder="山田 太郎">
        </div>

        <div class="form-group">
          <label class="form-label">お電話番号</label>
          <input type="tel" class="form-input" id="phone" placeholder="08012345678">
        </div>

      </div>

      <!-- Buttons -->
      <div class="step-buttons">
        <button class="btn-next" onclick="goToStep(4)">
          次へ進む
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <button class="btn-back" onclick="goToStep(2)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          前の画面に戻る
        </button>
      </div>
    </div>

    <!-- ====== Step 4: 連絡先 & 送信 ====== -->
    <div class="step-content" id="step4">
      <div class="step-form-container">

        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input type="email" class="form-input" id="email" placeholder="example@aaa.com">
        </div>

        <div class="form-group">
          <label class="form-label">ご相談内容（任意）</label>
          <textarea class="form-textarea" id="message" placeholder="ご不安なこと、ご希望の条件などを自由にお書きください" rows="4"></textarea>
        </div>

        <!-- Privacy Policy -->
        <div class="privacy-check">
          <label class="privacy-label">
            <input type="checkbox" id="privacy" class="privacy-checkbox">
            <span>プライバシーポリシーに同意して</span>
          </label>
        </div>

      </div>

      <!-- Buttons -->
      <div class="step-buttons">
        <button class="btn-submit" onclick="submitForm()">
          送信する
        </button>
        <button class="btn-back" onclick="goToStep(3)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          前の画面に戻る
        </button>
      </div>
    </div>

  </div>

  <script src="cta.js"></script>
</body>
</html>
